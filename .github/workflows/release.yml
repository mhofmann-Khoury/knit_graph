name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target repository'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"
  PACKAGE_NAME: "knit_graphs"

permissions:
  contents: read
  id-token: write

jobs:
  # ===========================================================================
  # RELEASE VALIDATION
  # ===========================================================================
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    outputs:
      target-repo: ${{ steps.determine-target.outputs.target }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Determine target repository
        id: determine-target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "target=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
            echo "🛠 Manual release to ${{ github.event.inputs.target }}"
          elif [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            echo "target=testpypi" >> $GITHUB_OUTPUT
            echo "🧪 Pre-release detected - will publish to TestPyPI"
          else
            echo "target=pypi" >> $GITHUB_OUTPUT
            echo "🚀 Full release detected - will publish to PyPI"
          fi

      - name: Get version from pyproject.toml
        id: get-version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Package version: $VERSION"

      - name: Validate version matches release tag
        if: github.event_name == 'release'
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          PYPROJECT_VERSION="${{ steps.get-version.outputs.version }}"
          CLEAN_TAG=${RELEASE_TAG#v}
          if [[ "$CLEAN_TAG" != "$PYPROJECT_VERSION" ]]; then
            echo "❌ Version mismatch: tag=$CLEAN_TAG, pyproject.toml=$PYPROJECT_VERSION"
            exit 1
          fi
          echo "✅ Version validated: $PYPROJECT_VERSION"

  # ===========================================================================
  # BUILD AND VALIDATE PACKAGE
  # ===========================================================================
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: validate-release

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-ubuntu-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build package
        run: |
          echo "📦 Building package..."
          poetry build

      - name: Validate package with twine
        run: |
          echo "🔍 Validating package metadata..."
          poetry run pip install twine
          poetry run twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-${{ needs.validate-release.outputs.version }}
          path: dist/

  # ===========================================================================
  # PUBLISH TO TESTPYPI
  # ===========================================================================
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-release, build]
    if: needs.validate-release.outputs.target-repo == 'testpypi'

    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ env.PACKAGE_NAME }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-${{ needs.validate-release.outputs.version }}
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Configure Poetry for TestPyPI
        run: |
          poetry config repositories.testpypi https://test.pypi.org/legacy/
          poetry config pypi-token.testpypi ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to TestPyPI
        run: poetry publish --repository testpypi

      - name: Summary
        run: |
          echo "✅ Published to TestPyPI: https://test.pypi.org/project/${{ env.PACKAGE_NAME }}/"
          echo "Install with: pip install --index-url https://test.pypi.org/simple/ ${{ env.PACKAGE_NAME }}==${{ needs.validate-release.outputs.version }}"

  # ===========================================================================
  # PUBLISH TO PYPI
  # ===========================================================================
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-release, build]
    if: needs.validate-release.outputs.target-repo == 'pypi'

    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.PACKAGE_NAME }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-${{ needs.validate-release.outputs.version }}
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Configure Poetry for PyPI
        run: poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to PyPI
        run: poetry publish

      - name: Summary
        run: |
          echo "✅ Published to PyPI: https://pypi.org/project/${{ env.PACKAGE_NAME }}/"
          echo "Install with: pip install ${{ env.PACKAGE_NAME }}==${{ needs.validate-release.outputs.version }}"
